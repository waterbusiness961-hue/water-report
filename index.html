// Load GP
const gpSelect = document.getElementById("gp");
Object.keys(data).forEach(gp => {
  let opt = document.createElement("option");
  opt.value = gp;
  opt.text = gp;
  gpSelect.appendChild(opt);
});

// Load villages
function loadVillages() {
  const gp = document.getElementById("gp").value;
  const container = document.getElementById("villageSection");
  container.innerHTML = "";

  if (!gp) return;

  Object.keys(data[gp]).forEach(village => {
    container.innerHTML += `
      <div class="row">
        <label>
          <input type="checkbox" onchange="toggleVillage('${village}')">
          <b>${village}</b>
        </label>
        <div id="hab_${village}" style="display:none; margin-left:15px;"></div>
      </div>
    `;
  });
}

// Show habitation
function toggleVillage(village) {
  const gp = document.getElementById("gp").value;
  const box = document.getElementById(`hab_${village}`);

  if (box.innerHTML !== "") {
    box.style.display = "none";
    box.innerHTML = "";
    return;
  }

  box.style.display = "block";

  let html = "";

  data[gp][village].forEach(hab => {
    html += `
      <div>
        <label>
          <input type="checkbox" onchange="toggleTime('${village}_${hab}')">
          ${hab}
        </label>

        <div id="time_${village}_${hab}" style="display:none;">
          Start:
          <input type="time" id="start_${village}_${hab}">
          End:
          <input type="time" id="end_${village}_${hab}">
          <br>
          Photo:
          <input type="file" id="photo_${village}_${hab}" accept="image/*">
        </div>
      </div>
    `;
  });

  box.innerHTML = html;
}

// Show time
function toggleTime(id) {
  let box = document.getElementById(`time_${id}`);
  box.style.display = box.style.display === "none" ? "block" : "none";
}

// Convert image to base64
function toBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = error => reject(error);
  });
}

// Submit
async function submitForm() {
  const date = document.getElementById("date").value;
  const gp = document.getElementById("gp").value;

  if (!date || !gp) {
    alert("Fill Date and GP");
    return;
  }

  let records = [];

  for (let village in data[gp]) {
    for (let hab of data[gp][village]) {

      let checkbox = document.querySelector(`input[onchange="toggleTime('${village}_${hab}')"]`);
      if (!checkbox || !checkbox.checked) continue;

      let start = document.getElementById(`start_${village}_${hab}`).value;
      let end = document.getElementById(`end_${village}_${hab}`).value;
      let photoInput = document.getElementById(`photo_${village}_${hab}`);

      if (!start || !end || !photoInput.files[0]) {
        alert("Fill time & photo for all selected habitations");
        return;
      }

      let base64 = await toBase64(photoInput.files[0]);

      records.push({
        date, gp, village, habitation: hab,
        start, end, image: base64
      });
    }
  }

  fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify(records)
  })
  .then(() => {
    alert("Submitted Successfully!");
    location.reload();
  })
  .catch(() => alert("Error"));
}
